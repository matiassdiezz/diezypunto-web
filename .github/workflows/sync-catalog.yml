name: Sync Catalog

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync all catalogs and merge
        run: npx tsx scripts/sync-all.ts --sync
        env:
          ZECAT_API_TOKEN: ${{ secrets.ZECAT_API_TOKEN }}
          CDO_API_TOKEN: ${{ secrets.CDO_API_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/catalog.json
          if git diff --cached --quiet; then
            echo "No changes to catalog"
          else
            git commit -m "chore: sync catalog from all providers"
            git push
          fi
