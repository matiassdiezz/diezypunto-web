<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Floor shadow -->
  <ellipse cx="200" cy="265" rx="120" ry="12" fill="#59C6F2" opacity="0.08"/>

  <!-- Document/page -->
  <rect x="130" y="60" width="140" height="180" rx="12" fill="#f3f4f6" stroke="#59C6F2" stroke-width="1.5" opacity="0.6"/>
  <rect x="155" y="95" width="90" height="8" rx="4" fill="#59C6F2" opacity="0.2"/>
  <rect x="155" y="115" width="70" height="8" rx="4" fill="#59C6F2" opacity="0.15"/>
  <rect x="155" y="135" width="80" height="8" rx="4" fill="#59C6F2" opacity="0.2"/>
  <rect x="155" y="155" width="50" height="8" rx="4" fill="#59C6F2" opacity="0.15"/>
  <rect x="155" y="175" width="65" height="8" rx="4" fill="#59C6F2" opacity="0.1"/>

  <!-- Magnifying glass -->
  <circle cx="260" cy="160" r="42" stroke="#59C6F2" stroke-width="4" fill="white" opacity="0.9"/>
  <circle cx="260" cy="160" r="32" stroke="#59C6F2" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="290" y1="190" x2="318" y2="218" stroke="#59C6F2" stroke-width="5" stroke-linecap="round"/>

  <!-- X mark inside magnifying glass -->
  <line x1="248" y1="148" x2="272" y2="172" stroke="#59C6F2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="272" y1="148" x2="248" y2="172" stroke="#59C6F2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Small decorative dots -->
  <circle cx="105" cy="100" r="4" fill="#59C6F2" opacity="0.15"/>
  <circle cx="320" cy="80" r="6" fill="#59C6F2" opacity="0.1"/>
  <circle cx="95" cy="200" r="3" fill="#59C6F2" opacity="0.12"/>
  <circle cx="335" cy="140" r="3" fill="#59C6F2" opacity="0.18"/>
</svg>
